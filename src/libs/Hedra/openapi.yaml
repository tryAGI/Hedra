openapi: '3.2.0'
info:
  title: Hedra Web API
  version: 0.1.0
servers:
  - url: https://mercury.dev.dream-ai.com/api
paths:
  /public/models:
    get:
      tags:
        - Public
      summary: List Models
      operationId: list_models_public_models_get
      parameters:
        - name: types
          in: query
          schema:
            title: Types
            anyOf:
              - type: array
                items:
                  type: string
              - type: 'null'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response List Models Public Models Get
                type: array
                items:
                  $ref: '#/components/schemas/AIModel'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: [ ]
  /public/voices:
    get:
      tags:
        - Public
      summary: List Voices
      operationId: list_voices_public_voices_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response List Voices Public Voices Get
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
      security:
        - APIKeyHeader: [ ]
  /public/assets:
    get:
      tags:
        - Public
      summary: List Assets
      operationId: list_assets_public_assets_get
      parameters:
        - name: type
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/AssetType'
        - name: ids
          in: query
          schema:
            title: Ids
            anyOf:
              - type: string
              - type: 'null'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response List Assets Public Assets Get
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: [ ]
    post:
      tags:
        - Public
      summary: Create Asset
      operationId: create_asset_public_assets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAssetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: [ ]
  '/public/assets/{id}/upload':
    post:
      tags:
        - Public
      summary: Upload Asset
      operationId: upload_asset_public_assets__id__upload_post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            title: Id
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_asset_public_assets__id__upload_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: [ ]
  /public/generations:
    get:
      tags:
        - Public
      summary: 'List '
      operationId: list__public_generations_get
      parameters:
        - name: type
          in: query
          schema:
            title: Type
            anyOf:
              - $ref: '#/components/schemas/AssetType'
              - $ref: '#/components/schemas/GenerationType'
              - type: 'null'
        - name: created_before
          in: query
          schema:
            title: Created Before
            anyOf:
              - type: string
                format: date-time
              - type: 'null'
        - name: created_after
          in: query
          schema:
            title: Created After
            anyOf:
              - type: string
                format: date-time
              - type: 'null'
        - name: prompt_query
          in: query
          schema:
            title: Prompt Query
            anyOf:
              - type: string
              - type: 'null'
        - name: agent_thread_id
          in: query
          schema:
            title: Agent Thread Id
            anyOf:
              - type: string
                format: uuid
              - type: 'null'
        - name: ids
          in: query
          schema:
            title: Ids
            anyOf:
              - type: string
              - type: 'null'
        - name: paging_params
          in: query
          schema:
            default:
              limit: 100
              offset: 0
            $ref: '#/components/schemas/PagingParams'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse_Generation_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: [ ]
    post:
      tags:
        - Public
      summary: Generate Asset
      operationId: generate_asset_public_generations_post
      requestBody:
        content:
          application/json:
            schema:
              title: Generate Request
              oneOf:
                - $ref: '#/components/schemas/GenerateVideoRequest-Input'
                - $ref: '#/components/schemas/GenerateTextToSpeechRequest'
                - $ref: '#/components/schemas/GenerateTextToSoundRequest'
                - $ref: '#/components/schemas/GenerateImageRequest'
                - $ref: '#/components/schemas/GenerateImageUpscaleRequest'
                - $ref: '#/components/schemas/GenerateVideoUpscaleRequest'
                - $ref: '#/components/schemas/GenerateIsolatedAudioRequest'
                - $ref: '#/components/schemas/GenerateSpeechToSpeechRequest'
                - $ref: '#/components/schemas/GenerateVoiceCloneRequest'
                - $ref: '#/components/schemas/GenerateAudioFromVideoRequest'
                - $ref: '#/components/schemas/GenerateVideoWithAudioRequest'
                - $ref: '#/components/schemas/GenerateVideoToVideoRequest'
                - $ref: '#/components/schemas/GenerateMotionControlRequest-Input'
              discriminator:
                propertyName: type
                mapping:
                  video: '#/components/schemas/GenerateVideoRequest-Input'
                  text_to_speech: '#/components/schemas/GenerateTextToSpeechRequest'
                  text_to_sound: '#/components/schemas/GenerateTextToSoundRequest'
                  image: '#/components/schemas/GenerateImageRequest'
                  image_to_image: '#/components/schemas/GenerateImageRequest'
                  image_upscale: '#/components/schemas/GenerateImageUpscaleRequest'
                  video_upscale: '#/components/schemas/GenerateVideoUpscaleRequest'
                  audio_isolation: '#/components/schemas/GenerateIsolatedAudioRequest'
                  speech_to_speech: '#/components/schemas/GenerateSpeechToSpeechRequest'
                  voice_clone: '#/components/schemas/GenerateVoiceCloneRequest'
                  audio_from_video: '#/components/schemas/GenerateAudioFromVideoRequest'
                  video_with_audio: '#/components/schemas/GenerateVideoWithAudioRequest'
                  video_to_video: '#/components/schemas/GenerateVideoToVideoRequest'
                  motion_control: '#/components/schemas/GenerateMotionControlRequest-Input'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Generate Asset Public Generations Post
                oneOf:
                  - $ref: '#/components/schemas/GenerateVideoResponse'
                  - $ref: '#/components/schemas/GenerateTextToSpeechResponse'
                  - $ref: '#/components/schemas/GenerateTextToSoundResponse'
                  - $ref: '#/components/schemas/GenerateImageResponse'
                  - $ref: '#/components/schemas/GenerateImageUpscaleResponse'
                  - $ref: '#/components/schemas/GenerateVideoUpscaleResponse'
                  - $ref: '#/components/schemas/GenerateIsolatedAudioResponse'
                  - $ref: '#/components/schemas/GenerateSpeechToSpeechResponse'
                  - $ref: '#/components/schemas/GenerateVoiceCloneResponse'
                  - $ref: '#/components/schemas/GenerateAudioFromVideoResponse'
                  - $ref: '#/components/schemas/GenerateVideoWithAudioResponse'
                  - $ref: '#/components/schemas/GenerateVideoToVideoResponse'
                  - $ref: '#/components/schemas/GenerateMotionControlResponse'
                discriminator:
                  propertyName: type
                  mapping:
                    video: '#/components/schemas/GenerateVideoResponse'
                    text_to_speech: '#/components/schemas/GenerateTextToSpeechResponse'
                    text_to_sound: '#/components/schemas/GenerateTextToSoundResponse'
                    image: '#/components/schemas/GenerateImageResponse'
                    image_to_image: '#/components/schemas/GenerateImageResponse'
                    image_upscale: '#/components/schemas/GenerateImageUpscaleResponse'
                    video_upscale: '#/components/schemas/GenerateVideoUpscaleResponse'
                    audio_isolation: '#/components/schemas/GenerateIsolatedAudioResponse'
                    speech_to_speech: '#/components/schemas/GenerateSpeechToSpeechResponse'
                    voice_clone: '#/components/schemas/GenerateVoiceCloneResponse'
                    audio_from_video: '#/components/schemas/GenerateAudioFromVideoResponse'
                    video_with_audio: '#/components/schemas/GenerateVideoWithAudioResponse'
                    video_to_video: '#/components/schemas/GenerateVideoToVideoResponse'
                    motion_control: '#/components/schemas/GenerateMotionControlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: [ ]
  '/public/generations/{generation_id}/status':
    get:
      tags:
        - Public
      summary: Get Status
      operationId: get_status_public_generations__generation_id__status_get
      parameters:
        - name: generation_id
          in: path
          required: true
          schema:
            title: Generation Id
            type: string
            format: uuid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: [ ]
  /public/billing/credits:
    get:
      tags:
        - Public
      summary: Get Credits
      operationId: get_credits_public_billing_credits_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'
      security:
        - APIKeyHeader: [ ]
components:
  schemas:
    AIModel:
      title: AIModel
      required:
        - id
        - name
        - description
        - type
        - price_details
      type: object
      properties:
        id:
          title: Id
          type: string
          description: ID of the model
        name:
          title: Name
          type: string
          description: Name of the model
        description:
          title: Description
          anyOf:
            - type: string
            - type: 'null'
          description: Description of the model.
        type:
          title: Type
          type: string
          description: Type of generation the model applies to.
        aspect_ratios:
          title: Aspect Ratios
          anyOf:
            - type: array
              items:
                type: string
            - type: 'null'
          description: Aspect ratios the model supports.
        resolutions:
          title: Resolutions
          anyOf:
            - type: array
              items:
                type: string
            - type: 'null'
          description: Resolutions the model supports.
        durations:
          title: Durations
          anyOf:
            - type: array
              items:
                type: string
            - type: 'null'
          description: Durations the model supports.
        requires_start_frame:
          title: Requires Start Frame
          anyOf:
            - type: boolean
            - type: 'null'
          description: Whether the model is conditioned by a start frame.
        requires_end_frame:
          title: Requires End Frame
          anyOf:
            - type: boolean
            - type: 'null'
          description: Whether the model is conditioned by an end frame.
        requires_audio_input:
          title: Requires Audio Input
          anyOf:
            - type: boolean
            - type: 'null'
          description: Whether the model is conditioned by audio input.
        requires_input_video:
          title: Requires Input Video
          anyOf:
            - type: boolean
            - type: 'null'
          description: Whether the model requires video input (video-to-video).
        requires_character_orientation:
          title: Requires Character Orientation
          anyOf:
            - type: boolean
            - type: 'null'
          description: Whether the model requires character orientation (motion control).
        eta_ms:
          title: Eta Ms
          anyOf:
            - type: integer
            - type: 'null'
          description: Average generation duration in milliseconds.
        tags:
          title: Tags
          anyOf:
            - type: array
              items:
                type: string
            - type: 'null'
          description: Tags for model categorization.
        max_duration_ms:
          title: Max Duration Ms
          anyOf:
            - type: integer
            - type: 'null'
          description: Maximum output duration in milliseconds for video/audio models.
        custom_resolution:
          title: Custom Resolution
          anyOf:
            - type: boolean
            - type: 'null'
          description: Whether the model supports custom resolution.
        price_details:
          description: Pricing details of the model.
          $ref: '#/components/schemas/AIModelPrice'
        pricing:
          anyOf:
            - $ref: '#/components/schemas/Pricing'
            - type: 'null'
          description: 'Extensible pricing information with dimension modifiers for resolution, audio, etc.'
        dimensions:
          title: Dimensions
          anyOf:
            - type: object
              additionalProperties:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Dimension'
            - type: 'null'
          description: Width and height for each aspect_ratio and resolution tuple.
        min_prompt_length:
          title: Min Prompt Length
          anyOf:
            - type: integer
            - type: 'null'
          description: Minimum character count for text prompts. Null means no minimum.
        max_prompt_length:
          title: Max Prompt Length
          anyOf:
            - type: integer
            - type: 'null'
          description: Maximum character count for text prompts. Null means no maximum.
        inputs:
          title: Inputs
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/InputMode'
            - type: 'null'
          description: List of input modes the model supports. Each mode groups mutually exclusive input slots. The frontend picks one mode. text_to_video (no inputs) is always implicitly available for VIDEO type models. Null means the model has no declarative input specifications (use requires_* booleans).
        logo_url:
          title: Logo Url
          anyOf:
            - type: string
            - type: 'null'
          description: URL of the model's logo in SVG format.
        premium:
          title: Premium
          type: boolean
          description: Whether this is a premium model.
          default: true
        display_order:
          title: Display Order
          anyOf:
            - type: integer
            - type: 'null'
          description: Display order for UI sorting. Lower values appear first.
    AIModelPrice:
      title: AIModelPrice
      required:
        - credit_cost
        - unit_scale
        - billing_unit
      type: object
      properties:
        credit_cost:
          title: Credit Cost
          type: integer
          description: Credit cost of the model.
        unit_scale:
          title: Unit Scale
          type: integer
          description: Unit scaling for the cost.
        billing_unit:
          title: Billing Unit
          type: string
          description: 'Billing unit of the model (e.g. ''generation'', ''second'', ''character'').'
    Asset:
      title: Asset
      required:
        - id
        - type
        - name
        - thumbnail_url
        - created_at
        - asset
      type: object
      properties:
        id:
          title: Id
          type: string
          description: The id of the asset.
          format: uuid
        type:
          description: The type of the asset.
          $ref: '#/components/schemas/AssetType'
        name:
          title: Name
          type: string
          description: Name of the asset. Default to user-provided file name.
        thumbnail_url:
          title: Thumbnail Url
          type: string
          description: URL of the thumbnail image.
        description:
          title: Description
          anyOf:
            - type: string
            - type: 'null'
          description: Optional description of the asset.
        is_favorite:
          title: Is Favorite
          type: boolean
          description: Whether the asset is favorited by the user.
          default: false
        recent:
          title: Recent
          type: boolean
          description: Whether this asset was recently used by the user.
          default: false
        created_at:
          title: Created At
          type: string
          description: Date the asset was created.
        favorited_at:
          title: Favorited At
          anyOf:
            - type: string
            - type: 'null'
          description: Date the asset was favorited.
        asset:
          title: Asset
          oneOf:
            - $ref: '#/components/schemas/UploadedImage'
            - $ref: '#/components/schemas/UploadedAudio'
            - $ref: '#/components/schemas/UploadedVideo'
            - $ref: '#/components/schemas/GeneratedAudio'
            - $ref: '#/components/schemas/GeneratedImage'
            - $ref: '#/components/schemas/GeneratedVideo'
            - $ref: '#/components/schemas/Voice'
          description: The asset itself.
          discriminator:
            propertyName: type
            mapping:
              generated_audio: '#/components/schemas/GeneratedAudio'
              generated_image: '#/components/schemas/GeneratedImage'
              generated_video: '#/components/schemas/GeneratedVideo'
              uploaded_audio: '#/components/schemas/UploadedAudio'
              uploaded_image: '#/components/schemas/UploadedImage'
              uploaded_video: '#/components/schemas/UploadedVideo'
              voice: '#/components/schemas/Voice'
    AssetType:
      title: AssetType
      enum:
        - text
        - image
        - audio
        - video
        - voice
      type: string
    BatchImageResultItem:
      title: BatchImageResultItem
      required:
        - created_at
        - status
        - progress
      type: object
      properties:
        id:
          title: Id
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          description: The id of the generation created. None if failed.
        asset_id:
          title: Asset Id
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          description: The id of the image asset resulting from the generation. None if failed.
        created_at:
          title: Created At
          type: string
          description: Date the generation was submitted.
        status:
          description: Status of the generation
          $ref: '#/components/schemas/GenerationStatus'
        progress:
          title: Progress
          type: number
          description: Current progress to completion. Between 0-1
        error:
          title: Error
          anyOf:
            - type: string
            - type: 'null'
          description: Error message if this item failed.
      description: Individual result item in a batch image generation.
    BatchVideoResultItem:
      title: BatchVideoResultItem
      required:
        - created_at
        - status
        - progress
      type: object
      properties:
        id:
          title: Id
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          description: The id of the generation created. None if failed.
        asset_id:
          title: Asset Id
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          description: The id of the video asset resulting from the generation. None if failed.
        created_at:
          title: Created At
          type: string
          description: Date the generation was submitted.
        status:
          description: Status of the generation
          $ref: '#/components/schemas/GenerationStatus'
        progress:
          title: Progress
          type: number
          description: Current progress to completion. Between 0-1
        error:
          title: Error
          anyOf:
            - type: string
            - type: 'null'
          description: Error message if this item failed.
        eta_sec:
          title: Eta Sec
          anyOf:
            - type: integer
            - type: 'null'
          description: Estimated time until completion in seconds. None if unavailable.
      description: Individual result item in a batch video generation.
    Body_upload_asset_public_assets__id__upload_post:
      title: Body_upload_asset_public_assets__id__upload_post
      required:
        - file
      type: object
      properties:
        file:
          title: File
          type: string
          unrecognizedKeywords:
            contentMediaType: application/octet-stream
    CreateAssetRequest:
      title: CreateAssetRequest
      required:
        - name
        - type
      type: object
      properties:
        name:
          title: Name
          type: string
          description: Name of the asset. Default to user-provided file name.
        type:
          description: The type of the asset.
          $ref: '#/components/schemas/AssetType'
        workspace_id:
          title: Workspace Id
          anyOf:
            - type: string
            - type: 'null'
    CreateAssetResponse:
      title: CreateAssetResponse
      required:
        - name
        - type
        - id
      type: object
      properties:
        name:
          title: Name
          type: string
          description: Name of the asset. Default to user-provided file name.
        type:
          description: The type of the asset.
          $ref: '#/components/schemas/AssetType'
        workspace_id:
          title: Workspace Id
          anyOf:
            - type: string
            - type: 'null'
        id:
          title: Id
          type: string
          description: The id of the newly created asset. Should be used for upload.
          format: uuid
        upload_url:
          title: Upload Url
          anyOf:
            - maxLength: 2083
              minLength: 1
              type: string
              format: uri
            - type: 'null'
          description: Presigned S3 URL for uploading the asset file using HTTP PUT. Only present when the asset type is VIDEO.
    CreditBalance:
      title: CreditBalance
      required:
        - remaining
        - expiring
        - used
      type: object
      properties:
        remaining:
          title: Remaining
          type: integer
          description: Remaining credits not yet used.
        expiring:
          title: Expiring
          type: integer
          description: Credits that will expire in the future.
        used:
          title: Used
          type: integer
          description: Credits used in the current billing period.
        workspace_credits:
          title: Workspace Credits
          anyOf:
            - type: object
              additionalProperties:
                type: integer
            - type: 'null'
          description: Credits for each workspace mapped by workspace_id. Only included if user is in a workspace.
      description: Information about the current balance of Credits and usage.
    Dimension:
      title: Dimension
      required:
        - width
        - height
      type: object
      properties:
        width:
          title: Width
          type: integer
          description: Width of the image.
        height:
          title: Height
          type: integer
          description: Height of the image.
    ErrorCode:
      title: ErrorCode
      enum:
        - UNKNOWN
        - INVALID_ARGUMENT
        - NOT_FOUND
        - ALREADY_EXISTS
        - UNAUTHORIZED
        - PERMISSION_DENIED
        - MISSING_CREDITS
        - MODERATION_FAILED
        - FAILED_PRECONDITION
        - DEADLINE_EXCEEDED
        - RESOURCE_EXHAUSTED
        - UNAVAILABLE
        - INTERNAL
      type: string
      description: "Universal error code space. Modeled after gRPC status codes.\n\nEvery exception in the system carries an ErrorCode. SDK clients map\n3rd-party errors to these codes at the lowest level. Retry logic,\nHTTP status mapping, and OTEL metrics all key off this enum.\n\nNOTE: The semantic meaning of these error codes is roughly mapped from the\n    semantic of the gRPC status codes: see\n    https://grpc.io/docs/guides/status-codes/ for details."
    GenerateAudioFromVideoRequest:
      title: GenerateAudioFromVideoRequest
      required:
        - audio_generation_model_id
        - video_id
      type: object
      properties:
        workspace_id:
          title: Workspace Id
          anyOf:
            - type: string
            - type: 'null'
        agent_thread_id:
          title: Agent Thread Id
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          description: Optional agent thread ID to associate this generation with.
        generation_id:
          title: Generation Id
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          description: 'Optional pre-reserved generation ID. If provided, this ID will be used instead of generating a new one. For batch operations (batch_size > 1), use generation_ids instead.'
        generation_ids:
          title: Generation Ids
          anyOf:
            - type: array
              items:
                type: string
                format: uuid
            - type: 'null'
          description: Optional list of pre-reserved generation IDs for batch operations. Length must match batch_size. Mutually exclusive with generation_id.
        type:
          const: audio_from_video
          title: Type
          type: string
          default: audio_from_video
        audio_generation_model_id:
          title: Audio Generation Model Id
          type: string
          description: ID of the model to use for video-to-audio generation (Mirelo Studio).
          format: uuid
        video_id:
          title: Video Id
          type: string
          description: The id of the video asset to generate audio from.
          format: uuid
        prompt:
          title: Prompt
          anyOf:
            - type: string
            - type: 'null'
          description: Optional prompt to guide the audio generation.
      description: Audio generation request that extracts sound effects from video using Mirelo Studio.
    GenerateAudioFromVideoResponse:
      title: GenerateAudioFromVideoResponse
      required:
        - audio_generation_model_id
        - video_id
        - id
        - created_at
        - status
        - progress
      type: object
      properties:
        workspace_id:
          title: Workspace Id
          anyOf:
            - type: string
            - type: 'null'
        agent_thread_id:
          title: Agent Thread Id
          anyOf:
            - type: string
