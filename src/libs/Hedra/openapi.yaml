          anyOf:
            - enum:
                - video
                - image
              type: string
            - type: 'null'
          description: 'For motion control models: ''video'' matches reference video orientation (better for complex motions, max 30s), ''image'' preserves character image orientation (better for camera movements, max 10s).'
        enhance_prompt:
          title: Enhance Prompt
          type: boolean
          description: 'If true, automatically enhance the prompt before generation.'
          default: false
        multi_prompt:
          title: Multi Prompt
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/VideoShot'
            - type: 'null'
          description: 'List of shots for multi-shot video generation. When provided, text_prompt is ignored and total duration is the sum of shot durations.'
        shot_type:
          title: Shot Type
          anyOf:
            - const: customize
              type: string
            - type: 'null'
          description: Shot type for multi-shot generation. Currently only 'customize' is supported.
    Generation:
      title: Generation
      required:
        - id
        - type
        - input
        - status
        - progress
        - created_at
      type: object
      properties:
        id:
          title: Id
          type: string
          description: ID of the generation and associated asset.
          format: uuid
        type:
          description: Type of generation.
          $ref: '#/components/schemas/AssetType'
        input:
          title: Input
          oneOf:
            - $ref: '#/components/schemas/GenerateVideoRequest-Output'
            - $ref: '#/components/schemas/GenerateTextToSpeechRequest'
            - $ref: '#/components/schemas/GenerateTextToSoundRequest'
            - $ref: '#/components/schemas/GenerateImageRequest'
            - $ref: '#/components/schemas/GenerateImageUpscaleRequest'
            - $ref: '#/components/schemas/GenerateVideoUpscaleRequest'
            - $ref: '#/components/schemas/GenerateIsolatedAudioRequest'
            - $ref: '#/components/schemas/GenerateSpeechToSpeechRequest'
            - $ref: '#/components/schemas/GenerateVoiceCloneRequest'
            - $ref: '#/components/schemas/GenerateAudioFromVideoRequest'
            - $ref: '#/components/schemas/GenerateVideoWithAudioRequest'
            - $ref: '#/components/schemas/GenerateVideoToVideoRequest'
            - $ref: '#/components/schemas/GenerateMotionControlRequest-Output'
          description: Inputs for the generation
          discriminator:
            propertyName: type
            mapping:
              audio_from_video: '#/components/schemas/GenerateAudioFromVideoRequest'
              audio_isolation: '#/components/schemas/GenerateIsolatedAudioRequest'
              image: '#/components/schemas/GenerateImageRequest'
              image_to_image: '#/components/schemas/GenerateImageRequest'
              image_upscale: '#/components/schemas/GenerateImageUpscaleRequest'
              motion_control: '#/components/schemas/GenerateMotionControlRequest-Output'
              speech_to_speech: '#/components/schemas/GenerateSpeechToSpeechRequest'
              text_to_sound: '#/components/schemas/GenerateTextToSoundRequest'
              text_to_speech: '#/components/schemas/GenerateTextToSpeechRequest'
              video: '#/components/schemas/GenerateVideoRequest-Output'
              video_to_video: '#/components/schemas/GenerateVideoToVideoRequest'
              video_upscale: '#/components/schemas/GenerateVideoUpscaleRequest'
              video_with_audio: '#/components/schemas/GenerateVideoWithAudioRequest'
              voice_clone: '#/components/schemas/GenerateVoiceCloneRequest'
        status:
          description: Status of the generation
          $ref: '#/components/schemas/GenerationStatus'
        progress:
          title: Progress
          type: number
          description: Current progress to completion. Between 0-1
        eta_sec:
          title: Eta Sec
          anyOf:
            - type: integer
            - type: 'null'
          description: Estimated time remaining in seconds until generation completes.
        created_at:
          title: Created At
          type: string
          description: Date the generation was submitted.
        credit_cost:
          title: Credit Cost
          anyOf:
            - type: integer
            - type: 'null'
          description: Credits consumed (debits) for this generation.
        batch_generation_id:
          title: Batch Generation Id
          anyOf:
            - type: string
            - type: 'null'
          description: Unique identifier linking all generations in a batch.
        asset:
          anyOf:
            - $ref: '#/components/schemas/Asset'
            - type: 'null'
          description: The generated asset. Value is not present unless the status of the generation is 'complete'
        audio_start_ms:
          title: Audio Start Ms
          anyOf:
            - type: integer
            - type: 'null'
          description: 'Audio start offset in ms. Negative = prepend silence, positive = crop from start.'
        error:
          anyOf:
            - $ref: '#/components/schemas/GenerationError'
            - type: 'null'
          description: Generation error if any. Value is not present unless the status of the generation is 'error' and error_message field is not present.
        error_message:
          title: Error Message
          anyOf:
            - type: string
            - type: 'null'
          description: Error message. Value is not present unless the status of the generation is 'error' and error field is not present.
    GenerationError:
      title: GenerationError
      required:
        - type
        - message
      type: object
      properties:
        type:
          description: The class of error encountered.
          $ref: '#/components/schemas/ErrorCode'
        message:
          title: Message
          type: string
          description: The error message.
    GenerationStatus:
      title: GenerationStatus
      enum:
        - complete
        - error
        - processing
        - queued
        - finalizing
      type: string
    GenerationStatusResponse:
      title: GenerationStatusResponse
      required:
        - id
        - asset_id
        - type
        - status
        - progress
        - created_at
      type: object
      properties:
        id:
          title: Id
          type: string
          description: ID of the generation.
          format: uuid
        asset_id:
          title: Asset Id
          type: string
          description: ID of the generated asset.
          format: uuid
        type:
          description: Type of generation.
          $ref: '#/components/schemas/AssetType'
        status:
          description: Status of the generation.
          $ref: '#/components/schemas/GenerationStatus'
        progress:
          title: Progress
          type: number
          description: Current progress to completion. Between 0-1
        created_at:
          title: Created At
          type: string
          description: Date the generation was submitted.
        error:
          anyOf:
            - $ref: '#/components/schemas/GenerationError'
            - type: 'null'
          description: Generation error if any. Value is not present unless the status of the generation is 'error' and error_message field is not present.
        error_message:
          title: Error Message
          anyOf:
            - type: string
            - type: 'null'
          description: Error message. Value is not present unless the status of the generation is 'error'
        url:
          title: Url
          anyOf:
            - type: string
            - type: 'null'
          description: URL of the generated asset.
        download_url:
          title: Download Url
          anyOf:
            - type: string
            - type: 'null'
          description: URL to download the asset.
        streaming_url:
          title: Streaming Url
          anyOf:
            - type: string
            - type: 'null'
          description: URL to stream the asset.
        workspace_id:
          title: Workspace Id
          anyOf:
            - type: string
            - type: 'null'
          description: ID of the workspace this generation belongs to.
    GenerationType:
      title: GenerationType
      enum:
        - image
        - video
        - text_to_speech
        - speech_to_speech
        - voice_clone
        - audio_isolation
        - video_stitching
        - video_upscale
        - video_to_video
        - image_upscale
        - agent_response
        - audio_from_video
        - text_to_sound
        - assets_to_image_text_prompt
        - assets_to_audio_text_prompt
      type: string
      description: "Generation type enum\n\nNOTE: this enum is used to determine the type of generation and is used to determine\nthe type of asset that will be generated."
    HTTPValidationError:
      title: HTTPValidationError
      type: object
      properties:
        detail:
          title: Detail
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    InputMode:
      title: InputMode
      required:
        - mode
        - slots
      type: object
      properties:
        mode:
          title: Mode
          type: string
          description: 'Mode name identifying this input combination (e.g., ''image_to_video'', ''first_last_frame_to_video'', ''reference_to_video'', ''video_to_video'').'
        slots:
          title: Slots
          type: array
          items:
            $ref: '#/components/schemas/InputSlot'
          description: Ordered list of input slots available in this mode.
      description: "A named input mode grouping mutually exclusive input slots.\n\nEach mode represents a distinct way to use the model (e.g., image_to_video\nvs first_last_frame_to_video). The frontend selects one mode at a time and\npresents only that mode's slots.\n\nThe text_to_video mode (no input files) is always implicitly available\nfor VIDEO type models and is never included in the inputs list."
    InputSlot:
      title: InputSlot
      required:
        - type
        - role
      type: object
      properties:
        type:
          title: Type
          type: string
          description: 'Media type: ''image'', ''video'', or ''audio''.'
        role:
          title: Role
          type: string
          description: 'Semantic role distinguishing this slot (e.g., ''start_frame'', ''end_frame'', ''reference'', ''audio_input'', ''input_video'').'
        required:
          title: Required
          type: boolean
          description: Whether this input is mandatory.
          default: false
        max_count:
          title: Max Count
          type: integer
          description: Maximum number of files for this slot.
          default: 1
        max_file_size_bytes:
          title: Max File Size Bytes
          anyOf:
            - type: integer
            - type: 'null'
          description: Maximum file size in bytes.
        min_dimension_px:
          title: Min Dimension Px
          anyOf:
            - type: integer
            - type: 'null'
          description: Minimum width or height in pixels.
        max_dimension_px:
          title: Max Dimension Px
          anyOf:
            - type: integer
            - type: 'null'
          description: Maximum width or height in pixels.
        min_duration_ms:
          title: Min Duration Ms
          anyOf:
            - type: integer
            - type: 'null'
          description: Minimum duration in milliseconds (video/audio only).
        max_duration_ms:
          title: Max Duration Ms
          anyOf:
            - type: integer
            - type: 'null'
          description: Maximum duration in milliseconds (video/audio only).
        max_total_duration_ms:
          title: Max Total Duration Ms
          anyOf:
            - type: integer
            - type: 'null'
          description: Maximum combined duration across all files in this slot in milliseconds (video/audio only).
      description: "A typed input slot describing one kind of input a model accepts.\n\nEach slot has a media type (image, video, audio) and a role that distinguishes\nit from other slots of the same type (e.g., start_frame vs end_frame vs reference)."
    KlingEditElement:
      title: KlingEditElement
      required:
        - frontal_image_asset_id
      type: object
      properties:
        frontal_image_asset_id:
          title: Frontal Image Asset Id
          type: string
          description: ID of the frontal image asset for this element.
          format: uuid
        reference_image_asset_ids:
          title: Reference Image Asset Ids
          anyOf:
            - type: array
              items:
                type: string
                format: uuid
            - type: 'null'
          description: Optional IDs of additional reference image assets (different angles).
      description: "Element for character/subject consistency in Kling video generation.\n\nReference as @Element1, @Element2, etc. in prompt."
    NormalizedPoint:
      maxItems: 2
      minItems: 2
      type: array
      unrecognizedKeywords:
        prefixItems:
          - type: number
            maximum: 1.0
            minimum: 0.0
            title: X
            description: Normalized x coordinate.
          - type: number
            maximum: 1.0
            minimum: 0.0
            title: Y
            description: Normalized y coordinate.
    PageInfo:
      title: PageInfo
      required:
        - limit
        - offset
      type: object
      properties:
        limit:
          title: Limit
          type: integer
          description: Number of items returned in the page.
        offset:
          title: Offset
          type: integer
          description: Number of records skipped.
    PagedResponse_Generation_:
      title: 'PagedResponse[Generation]'
      required:
        - page_info
        - data
      type: object
      properties:
        page_info:
          description: Paging information.
          $ref: '#/components/schemas/PageInfo'
        data:
          title: Data
          type: array
          items:
            $ref: '#/components/schemas/Generation'
          description: Page data.
    PagingParams:
      title: PagingParams
      type: object
      properties:
        limit:
          title: Limit
          type: integer
          description: Number of items returned in the page.
          default: 100
        offset:
          title: Offset
          type: integer
          description: Number of records skipped.
          default: 0
    Pricing:
      title: Pricing
      type: object
      properties:
        base_cost:
          title: Base Cost
          anyOf:
            - type: integer
            - type: 'null'
          description: Flat base cost in credits. Present for per-generation models (images). Duration-based models leave this unset.
        credits_per_second:
          title: Credits Per Second
          anyOf:
            - type: integer
            - type: 'null'
          description: Credit cost per second. Only present for duration-based models. Image/per-generation models leave this unset.
        modifiers:
          title: Modifiers
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: number
              description: "Pricing modifier multiplier applied to a dimension option.\n- 1.0 = no change (base price)\n- 2.0 = double the base price\n- 0.5 = half the base price"
          description: 'Pricing modifiers by dimension. Each dimension (e.g. ''resolution'', ''generate_audio'') maps option values to their price multipliers. Only non-1.0 modifiers are included (1.0 is the implicit default). Example: {''resolution'': {''540p'': 0.5, ''1080p'': 3.0}}'
      description: "Extensible pricing information for AI models.\n\nPrice is calculated as:\n    credits = ceil((base_cost + credits_per_second * duration_seconds) * product(modifiers))\n\nFor video models (per-second billing):\n    - base_cost is typically 0\n    - credits_per_second is the per-second rate\n    - duration_seconds is the video length\n    - modifiers adjust for resolution, audio generation, etc.\n\nFor image models (per-generation billing):\n    - base_cost is the flat cost per generation (e.g., 5 credits)\n    - credits_per_second is 0\n    - duration_seconds is ignored (or 0)\n    - modifiers can still adjust for resolution, style, etc.\n\nModifiers are only included when they affect pricing (i.e., non-1.0 values)."
    SupportedLanguage:
      title: SupportedLanguage
      enum:
        - Chinese
        - 'Chinese,Yue'
        - English
        - Arabic
        - Russian
        - Spanish
        - French
        - Portuguese
        - German
        - Turkish
        - Dutch
        - Ukrainian
        - Vietnamese
        - Indonesian
        - Japanese
        - Italian
        - Korean
        - Thai
        - Polish
        - Romanian
        - Greek
        - Czech
        - Finnish
        - Hindi
        - Bulgarian
        - Danish
        - Hebrew
        - Malay
        - Persian
        - Slovak
        - Swedish
        - Croatian
        - Filipino
        - Hungarian
        - Norwegian
        - Slovenian
        - Catalan
        - Nynorsk
        - Tamil
        - Afrikaans
        - auto
      type: string
    UploadedAudio:
      title: UploadedAudio
      required:
        - duration_ms
        - url
      type: object
      properties:
        type:
          const: uploaded_audio
          title: Type
          type: string
          default: uploaded_audio
        duration_ms:
          title: Duration Ms
          type: integer
          description: Duration of the audio in seconds.
        url:
          title: Url
          type: string
          description: URL of the audio.
        transcriptions:
          title: Transcriptions
          anyOf:
            - type: array
              items:
                type: object
            - type: 'null'
          description: Transcriptions of the audio.
    UploadedImage:
      title: UploadedImage
      required:
        - width
        - height
        - url
      type: object
      properties:
        type:
          const: uploaded_image
          title: Type
          type: string
          default: uploaded_image
        width:
          title: Width
          type: integer
          description: Width of the image.
        height:
          title: Height
          type: integer
          description: Height of the image.
        url:
          title: Url
          type: string
          description: URL of the image.
    UploadedVideo:
      title: UploadedVideo
      required:
        - width
        - height
        - duration_ms
        - url
      type: object
      properties:
        type:
          const: uploaded_video
          title: Type
          type: string
          default: uploaded_video
        width:
          title: Width
          type: integer
          description: Width of the video.
        height:
          title: Height
          type: integer
          description: Height of the video.
        duration_ms:
          title: Duration Ms
          type: integer
          description: Duration of the video in milliseconds.
        url:
          title: Url
          type: string
          description: URL of the video.
        download_url:
          title: Download Url
          anyOf:
            - type: string
            - type: 'null'
          description: URL to download the video.
        streaming_url:
          title: Streaming Url
          anyOf:
            - type: string
            - type: 'null'
          description: URL to stream the video.
        poster_url:
          title: Poster Url
          anyOf:
            - type: string
            - type: 'null'
          description: URL of the poster image.
    ValidationError:
      title: ValidationError
      required:
        - loc
        - msg
        - type
      type: object
      properties:
        loc:
          title: Location
          type: array
          items:
            anyOf:
              - type: string
              - type: integer
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
        input:
          title: Input
        ctx:
          title: Context
          type: object
    VideoShot:
      title: VideoShot
      required:
        - prompt
        - duration_ms
      type: object
      properties:
        prompt:
          title: Prompt
          type: string
          description: Prompt for this shot.
        duration_ms:
          title: Duration Ms
          maximum: 15000.0
          minimum: 3000.0
          type: integer
          description: Duration of this shot in milliseconds (3000-15000).
      description: A single shot in a multi-shot video generation.
    Voice:
      title: Voice
      type: object
      properties:
        type:
          const: voice
          title: Type
          type: string
          default: voice
        external_id:
          title: External Id
          anyOf:
            - type: string
            - type: 'null'
          description: External ID of the Voice.
        labels:
          title: Labels
          type: array
          items:
            $ref: '#/components/schemas/VoiceLabel'
          description: Labels that help identify the characteristics of the Voice.
        preview_url:
          title: Preview Url
          anyOf:
            - type: string
            - type: 'null'
          description: Preview URL of the Voice.
        source:
          title: Source
          anyOf:
            - type: string
            - type: 'null'
          description: Source of the Voice.
    VoiceLabel:
      title: VoiceLabel
      required:
        - name
        - value
      type: object
      properties:
        name:
          title: Name
          type: string
          description: Label name.
        value:
          title: Value
          type: string
          description: Label value.
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      name: X-API-Key
      in: header
security:
  - APIKeyHeader: [ ]
tags:
  - name: Public
    description: Public endpoints are available to API users.